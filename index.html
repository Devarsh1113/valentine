<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Be My Valentine 💖</title>

<style>
* {
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.card {
  background: white;
  width: 90%;
  max-width: 420px;
  padding: 40px 30px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 25px 50px rgba(0,0,0,0.25);
  animation: fadeIn 0.8s ease;
  z-index: 10;
}

h1 {
  color: #ff4d6d;
}

.buttons {
  margin-top: 30px;
  display: flex;
  justify-content: center;
  gap: 20px;
}

button {
  padding: 14px 30px;
  border: none;
  border-radius: 30px;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.3s ease;
}

#yes {
  background: #ff4d6d;
  color: white;
}

#no {
  background: #e0e0e0;
  color: #333;
}

.photo {
  width: 260px;
  border-radius: 18px;
  margin: 20px 0;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.heart {
  position: absolute;
  font-size: 22px;
  animation: float 6s linear infinite;
  pointer-events: none;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.85); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes float {
  from {
    transform: translateY(100vh) scale(0.6);
    opacity: 1;
  }
  to {
    transform: translateY(-10vh) scale(1.2);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="card" id="card">
  <h1>Heta, will you be my Valentine? 💘</h1>

  <div class="buttons">
    <button id="yes">Yes 💖</button>
    <button id="no">No 😅</button>
  </div>
</div>

<script>
let yesScale = 1;
let noIndex = 0;

const noTexts = [
  "No 😅",
  "Nope 🙅‍♀️",
  "Not yet 🤔",
  "Still no 😬",
  "You wish 😏",
  "Almost… no 😳"
];

document.getElementById("no").addEventListener("click", () => {
  const yes = document.getElementById("yes");
  const no = document.getElementById("no");

  yesScale += 0.25;
  yes.style.transform = `scale(${yesScale})`;

  noIndex = (noIndex + 1) % noTexts.length;
  no.textContent = noTexts[noIndex];
});

document.getElementById("yes").addEventListener("click", () => {
  document.getElementById("card").innerHTML = `
    <h1>Always You 💖</h1>
    <img src="heta.jpg" class="photo" />

    <p>Happy Valentine’s Day, Heta 🌸</p>

    <p>
      Being in a long-distance relationship for years hasn’t been easy,
      but every single day you’ve made it worth it.
    </p>

    <p>
      Thank you for waiting, for believing in us,
      and for standing by me no matter how far apart we are.
    </p>

    <p>
      Everything I’m working towards is leading me back to you —
      back home, back to us.
    </p>

    <p><strong>
      Until the day I’m back in India and we finally get all that time together,
      know that my heart has always been yours ❤️
    </strong></p>
  `;
});

function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.textContent = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = Math.random() * 3 + 4 + "s";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 400);
</script>

</body>
</html>
