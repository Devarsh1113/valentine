<script>
    let yesScale = 1;
    let noIndex = 0;
    
    const noTexts = [
      "No 😅",
      "Nope 🙅‍♀️",
      "Not yet 🤔",
      "Still no 😬",
      "You wish 😏",
      "Almost… no 😳"
    ];
    
    function noClick() {
      const yes = document.getElementById("yes");
      const no = document.getElementById("no");
    
      yesScale += 0.25;
      yes.style.transform = `scale(${yesScale})`;
    
      noIndex = (noIndex + 1) % noTexts.length;
      no.textContent = noTexts[noIndex];
    }
    
    function yesClick() {
      document.getElementById("card").innerHTML = `
        <h1>Always You 💖</h1>
        <img src="heta.jpg" class="photo">
    
        <p>Happy Valentine’s Day, Heta 🌸</p>
    
        <p>
          Being this far apart for so long hasn’t been easy,
          but not a single day has gone by where I didn’t feel
          grateful for you.
        </p>
    
        <p>
          Thank you for waiting, for believing in us,
          and for standing by me even when distance
          tried its best to make things hard.
        </p>
    
        <p>
          I may not be there with you right now,
          but every plan I make, every step I take,
          is leading me back to you — back home.
        </p>
    
        <p><strong>
          Until the day I’m back in India and we finally
          get to spend all that time together,
          know that my heart is always with you ❤️
        </strong></p>
      `;
    }
    
    function heart() {
      const h = document.createElement("div");
      h.className = "heart";
      h.innerHTML = "❤️";
      h.style.left = Math.random() * 100 + "vw";
      h.style.animationDuration = Math.random() * 3 + 4 + "s";
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 6000);
    }
    
    setInterval(heart, 350);
    </script>
